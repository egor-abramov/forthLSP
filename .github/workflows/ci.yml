name: LSP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  haskell-server:
    name: Build & Test Haskell Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('**/server.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update Cabal index
        run: cabal update

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build Server
        run: cabal build all

      - name: Run Tests
        run: cabal test server-test

      - name: Upload Haskell Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: haskell-server-binary
          path: dist-newstyle/build/x86_64-windows/ghc-9.6.7/server-0.1.0.0/x/server/build/server/server


  intellij-plugin:
    name: Build IntelliJ Plugin
    runs-on: ubuntu-latest
    needs: haskell-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Haskell Binary
        uses: actions/download-artifact@v4
        with:
          name: haskell-server-binary
          path: src/main/resources/bin/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Plugin
        run: |
          chmod +x gradlew
          ./gradlew buildPlugin

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forth-lsp-plugin
          path: build/distributions/*.zip