name: LSP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  haskell-server:
    name: Build & Test Haskell Server
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: 'latest'
          cache: true

      - name: Cache project build artifacts
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-dist-${{ hashFiles('**/*.hs', '**/server.cabal') }}
          restore-keys: |
            ${{ runner.os }}-dist-

      - name: Update Cabal index
        run: cabal update

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build Server
        run: cabal build all

      - name: Run Tests
        run: cabal test server-test

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p server-bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_PATH=$(find dist-newstyle -name "server.exe" -type f | head -n 1)
            cp "$BIN_PATH" server-bin/server-windows.exe
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            BIN_PATH=$(find dist-newstyle -name "server" -type f | head -n 1)
            cp "$BIN_PATH" server-bin/server-macos
          else
            BIN_PATH=$(find dist-newstyle -name "server" -type f | head -n 1)
            cp "$BIN_PATH" server-bin/server-linux
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: haskell-server-${{ matrix.os }}
          path: server-bin/


  intellij-plugin:
    name: Build IntelliJ Plugin
    runs-on: ubuntu-latest
    needs: haskell-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: haskell-server-windows-latest
          path: server-bin/

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: haskell-server-linux-latest
          path: server-bin/

      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: haskell-server-macos-latest
          path: server-bin/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Plugin
        run: |
          chmod +x gradlew
          ./gradlew buildPlugin --build-cache

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forth-lsp-plugin
          path: build/distributions/*.zip